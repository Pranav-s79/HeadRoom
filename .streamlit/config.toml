# HeadRoom visual identity — native widget theming (complements the CSS variables
# injected in dashboard/app.py). Ensures no Streamlit default colors are visible.
[theme]
base = "dark"
primaryColor = "#f59e0b"
backgroundColor = "#1a1a1a"
secondaryBackgroundColor = "#242424"
textColor = "#f5f5f5"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false
